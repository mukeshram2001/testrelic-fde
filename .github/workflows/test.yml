name: Test & Intelligence Report

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Run Playwright Tests + Upload to TestRelic
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Smart Reporter
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Start demo app server
        run: npx serve tests/fixtures/demo-app -l 3456 &

      - name: Wait for demo app
        run: npx wait-on http://localhost:3456 --timeout 30000

      - name: Run Playwright tests
        run: npx playwright test
        env:
          TESTRELIC_API_KEY: ${{ secrets.TESTRELIC_API_KEY }}

      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - name: Upload to TestRelic
        if: always() && secrets.TESTRELIC_API_KEY != ''
        run: npx smart-reporter analyze --input test-results/junit-report.xml --format json --output intelligence-report.json
        env:
          TESTRELIC_API_KEY: ${{ secrets.TESTRELIC_API_KEY }}

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Smart Reporter Analysis + PR Comment
  # ═══════════════════════════════════════════════════════════════
  intelligence:
    name: Generate Intelligence Report
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Smart Reporter
        run: npm run build

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/

      - name: Generate markdown report
        run: node dist/cli.js analyze --input test-results/junit-report.xml --format markdown --output test-report.md

      - name: Comment PR with report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'test-report.md';
            let report = 'Test intelligence report not generated.';
            try {
              report = fs.readFileSync(reportPath, 'utf-8');
            } catch (e) {
              report = '⚠️ Could not generate test report. Check the Actions logs for details.';
            }
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.includes('Test Intelligence Report'));
            
            const body = `## 🧪 Test Intelligence Report\n\n${report}\n\n---\n*Generated by [TestRelic Smart Reporter](https://testrelic.ai)*`;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload markdown report
        uses: actions/upload-artifact@v4
        with:
          name: intelligence-report
          path: test-report.md
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Type Check & Lint
  # ═══════════════════════════════════════════════════════════════
  quality:
    name: Type Check & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint
